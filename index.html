<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Velosipēdu noma</title>

    <!-- Ikonas -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1><i class="fa-solid fa-bicycle"></i> Velosipēdu noma</h1>
    <p>Izvēlies velosipēdu un ievadi dienu skaitu</p>

    <label>Velosipēda veids:</label>
    <select id="bike">
        <option value="10">Pilsētas velo – 10€ / dienā</option>
        <option value="15">Kalnu velo – 15€ / dienā</option>
        <option value="20">Elektriskais velo – 20€ / dienā</option>
    </select>

    <label>Dienu skaits:</label>
    <input type="number" id="days" min="1" placeholder="Ievadi dienu skaitu">

    <button id="btn">Aprēķināt</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
